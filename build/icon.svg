<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background rounded square (macOS Big Sur style) -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Three kanban columns -->
  <!-- Column 1 -->
  <rect x="140" y="180" width="230" height="664" rx="24" fill="rgba(255,255,255,0.15)"/>

  <!-- Column 2 -->
  <rect x="397" y="180" width="230" height="664" rx="24" fill="rgba(255,255,255,0.15)"/>

  <!-- Column 3 -->
  <rect x="654" y="180" width="230" height="664" rx="24" fill="rgba(255,255,255,0.15)"/>

  <!-- Cards in Column 1 -->
  <rect x="160" y="220" width="190" height="120" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>
  <rect x="160" y="360" width="190" height="90" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>
  <rect x="160" y="470" width="190" height="140" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>

  <!-- Cards in Column 2 -->
  <rect x="417" y="220" width="190" height="100" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>
  <rect x="417" y="340" width="190" height="130" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>

  <!-- Cards in Column 3 -->
  <rect x="674" y="220" width="190" height="80" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>
  <rect x="674" y="320" width="190" height="110" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>
  <rect x="674" y="450" width="190" height="95" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>
  <rect x="674" y="565" width="190" height="70" rx="16" fill="url(#card)" filter="url(#cardShadow)"/>

  <!-- Card detail lines (subtle) -->
  <rect x="180" y="250" width="100" height="8" rx="4" fill="rgba(99,102,241,0.6)"/>
  <rect x="180" y="270" width="140" height="6" rx="3" fill="rgba(0,0,0,0.1)"/>
  <rect x="180" y="285" width="120" height="6" rx="3" fill="rgba(0,0,0,0.1)"/>

  <rect x="437" y="250" width="90" height="8" rx="4" fill="rgba(34,197,94,0.7)"/>
  <rect x="437" y="270" width="130" height="6" rx="3" fill="rgba(0,0,0,0.1)"/>

  <rect x="694" y="250" width="80" height="8" rx="4" fill="rgba(249,115,22,0.7)"/>
  <rect x="694" y="270" width="110" height="6" rx="3" fill="rgba(0,0,0,0.1)"/>
</svg>
